<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#04040a;
  --surface:#080812;
  --card:#0c0c1a;
  --border:#1a1a3a;
  --cyan:#00f5ff;
  --pink:#ff2d78;
  --purple:#7b2fff;
  --text:#e8e8ff;
  --muted:#4a4a6a;
  --glow-cyan:0 0 20px #00f5ff44;
  --glow-pink:0 0 20px #ff2d7844;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Grid background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* Glow orbs */
body::after{
  content:'';
  position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle, #7b2fff0a 0%, transparent 70%);
  top:-200px;right:-200px;
  pointer-events:none;
  z-index:0;
  animation:orb 8s ease-in-out infinite alternate;
}

@keyframes orb{
  from{transform:translate(0,0);}
  to{transform:translate(-50px,50px);}
}

/* Header */
.header{
  position:relative;z-index:10;
  padding:16px 20px;
  background:linear-gradient(180deg, #080812ee 0%, #04040aaa 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}

.header-logo{
  position:relative;
  width:44px;height:44px;
  border-radius:14px;
  background:linear-gradient(135deg,#00f5ff15,#7b2fff15);
  border:1px solid #00f5ff33;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:var(--glow-cyan);
  flex-shrink:0;
}

.header-logo::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:14px;
  background:linear-gradient(135deg,#00f5ff,#7b2fff,#ff2d78);
  z-index:-1;
  opacity:0.3;
}

.header-text h1{
  font-size:16px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  background:linear-gradient(90deg,#00f5ff,#7b2fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header-text p{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  font-family:'Space Mono',monospace;
}

.header-status{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:#00f5ff;
}

.pulse-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:#00f5ff;
  box-shadow:0 0 8px #00f5ff;
  animation:pulseDot 2s infinite;
}

@keyframes pulseDot{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.5;transform:scale(0.8);}
}

/* Chat area */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  gap:16px;
  scroll-behavior:smooth;
  position:relative;
  z-index:1;
}

#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Welcome */
.welcome{
  text-align:center;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.welcome-glyph{
  font-size:56px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #7b2fff);
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.welcome h2{
  font-size:24px;
  font-weight:800;
  letter-spacing:1px;
  background:linear-gradient(135deg,#00f5ff,#7b2fff,#ff2d78);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.welcome p{
  font-size:13px;
  color:var(--muted);
  max-width:280px;
  line-height:1.7;
  font-weight:400;
}

.welcome-chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-top:8px;
}

.chip{
  padding:8px 14px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--muted);
  transition:all .2s;
  font-family:'Space Mono',monospace;
  letter-spacing:0.5px;
}

.chip:hover{
  border-color:#00f5ff55;
  color:#00f5ff;
  box-shadow:var(--glow-cyan);
  background:#00f5ff08;
}

/* Messages */
.msg{
  display:flex;
  gap:10px;
  animation:msgIn .25s ease;
}

@keyframes msgIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:none;}
}

.msg.user{flex-direction:row-reverse;}

.msg-avatar{
  width:32px;height:32px;
  border-radius:10px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  align-self:flex-end;
}

.msg.ai .msg-avatar{
  background:linear-gradient(135deg,#00f5ff15,#7b2fff15);
  border:1px solid #00f5ff22;
  box-shadow:var(--glow-cyan);
}

.msg.user .msg-avatar{
  background:var(--card);
  border:1px solid var(--border);
}

.msg-content{max-width:82%;}

.msg-bubble{
  padding:12px 16px;
  border-radius:16px;
  font-size:13px;
  line-height:1.7;
  word-break:break-word;
  white-space:pre-wrap;
  font-weight:400;
}

.msg.ai .msg-bubble{
  background:var(--card);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  font-family:'Syne',sans-serif;
}

.msg.user .msg-bubble{
  background:linear-gradient(135deg,#00f5ff0f,#7b2fff0f);
  border:1px solid #00f5ff22;
  border-bottom-right-radius:4px;
  color:#d0f0ff;
  box-shadow:0 0 30px #00f5ff08;
}

.msg-file{
  display:flex;align-items:center;gap:8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 12px;
  margin-bottom:6px;
  font-size:12px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
}

.msg-img{
  max-width:200px;
  border-radius:12px;
  margin-bottom:6px;
  display:block;
  border:1px solid var(--border);
}

.msg-actions{
  display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;
}

.action-btn{
  padding:5px 11px;
  border:none;border-radius:8px;
  font-size:11px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:all .15s;
  font-family:'Space Mono',monospace;
  letter-spacing:0.5px;
}

.action-btn:active{transform:scale(.95);}

.btn-copy{background:#0c0c1a;color:#555;border:1px solid #1a1a3a;}
.btn-copy:hover{color:#00f5ff;border-color:#00f5ff44;}
.btn-dl-js{background:#001500;color:#4ade80;border:1px solid #16a34a33;}
.btn-dl-txt{background:#000a18;color:#00f5ff;border:1px solid #00f5ff33;}
.btn-dl-json{background:#150800;color:#fb923c;border:1px solid #ea580c33;}

/* Typing */
.typing-indicator{
  display:flex;gap:5px;align-items:center;padding:12px 16px;
}

.typing-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:#1a1a3a;
  animation:typeBounce 1.2s infinite ease-in-out;
}

.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}

@keyframes typeBounce{
  0%,80%,100%{transform:scale(0.6);background:#1a1a3a;}
  40%{transform:scale(1.1);background:#00f5ff;box-shadow:0 0 8px #00f5ff;}
}

/* Preview */
#preview-area{
  display:none;
  padding:8px 16px;
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-wrap:wrap;gap:8px;
  position:relative;z-index:1;
}

#preview-area.show{display:flex;}

.preview-item{
  display:flex;align-items:center;gap:8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 10px;
  font-size:12px;
  max-width:200px;
}

.preview-item img{
  width:36px;height:36px;
  object-fit:cover;border-radius:6px;
}

.preview-item-info{flex:1;min-width:0;}

.preview-item-name{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);font-size:11px;
  font-family:'Space Mono',monospace;
}

.preview-item-size{color:var(--muted);font-size:10px;}

.preview-remove{
  background:none;border:none;
  color:#ef4444;cursor:pointer;font-size:16px;padding:0 2px;
}

/* Input */
.input-area{
  padding:14px 16px;
  background:linear-gradient(0deg,#08081299 0%,transparent 100%);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  position:relative;z-index:10;
  flex-shrink:0;
}

.input-row{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:10px 10px 10px 16px;
  transition:border-color .2s, box-shadow .2s;
}

.input-row:focus-within{
  border-color:#00f5ff33;
  box-shadow:0 0 0 1px #00f5ff11, var(--glow-cyan);
}

#msg-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);
  font-size:13px;font-family:'Syne',sans-serif;
  resize:none;max-height:120px;
  line-height:1.6;padding:2px 0;
}

#msg-input::placeholder{color:var(--muted);}

.input-btns{display:flex;gap:6px;align-items:flex-end;}

.icon-btn{
  width:38px;height:38px;
  border:none;border-radius:12px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  transition:all .15s;flex-shrink:0;
}

.icon-btn:active{transform:scale(.9);}

#btn-attach{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted);
}

#btn-attach:hover{
  color:#00f5ff;
  border-color:#00f5ff44;
  box-shadow:var(--glow-cyan);
}

#btn-send{
  background:linear-gradient(135deg,#00f5ff,#7b2fff);
  color:#000;font-weight:700;
  box-shadow:0 4px 20px #00f5ff33;
}

#btn-send:hover{
  box-shadow:0 4px 30px #00f5ff55;
  transform:scale(1.05);
}

#btn-send:disabled{
  background:var(--card);
  color:#333;cursor:not-allowed;
  box-shadow:none;transform:none;
}

input[type=file]{display:none;}

/* Scanline effect */
.scanline{
  position:fixed;
  top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,#00f5ff33,transparent);
  animation:scan 6s linear infinite;
  pointer-events:none;z-index:999;
  opacity:0.4;
}

@keyframes scan{
  0%{top:-2px;}
  100%{top:100vh;}
}
</style>
</head>
<body>

<div class="scanline"></div>

<div class="header">
  <div class="header-logo">🤖</div>
  <div class="header-text">
    <h1>CHAT IA</h1>
    <p>Assistente inteligente</p>
  </div>
  <div class="header-status">
    <div class="pulse-dot"></div>
    ONLINE
  </div>
</div>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-glyph">⬡</div>
    <h2>Olá, como posso ajudar?</h2>
    <p>Manda uma mensagem, arquivo .js, .txt, .json ou foto — eu leio tudo e respondo em segundos.</p>
    <div class="welcome-chips">
      <div class="chip" onclick="sendQuick('Explica esse código pra mim')">📄 Analisar código</div>
      <div class="chip" onclick="sendQuick('Cria uma função JS que...')">⚡ Gerar JS</div>
      <div class="chip" onclick="sendQuick('O que tem nessa imagem?')">🖼️ Analisar foto</div>
      <div class="chip" onclick="sendQuick('Me ajuda com um erro no código')">🐛 Debug</div>
    </div>
  </div>
</div>

<div id="preview-area"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msg-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <div class="input-btns">
      <button class="icon-btn" id="btn-attach" onclick="document.getElementById('file-input').click()" title="Anexar">📎</button>
      <button class="icon-btn" id="btn-send" onclick="enviar()" title="Enviar">▶</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*,.js,.txt,.json,.html,.css,.md,.py,.ts" multiple>

<script>
var anexos=[];
var carregando=false;
var input=document.getElementById('msg-input');

input.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});

input.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}
});

document.getElementById('file-input').addEventListener('change',function(){
  var files=Array.from(this.files);
  files.forEach(function(file){
    var reader=new FileReader();
    var isImage=file.type.startsWith('image/');
    reader.onload=function(e){
      anexos.push({type:isImage?'image':'file',name:file.name,size:file.size,mimeType:file.type||'text/plain',data:e.target.result});
      renderPreviews();
    };
    if(isImage) reader.readAsDataURL(file);
    else reader.readAsText(file);
  });
  this.value='';
});

function renderPreviews(){
  var area=document.getElementById('preview-area');
  if(!anexos.length){area.className='';area.innerHTML='';return;}
  area.className='show';
  area.innerHTML=anexos.map(function(a,i){
    if(a.type==='image') return '<div class="preview-item"><img src="'+a.data+'" alt=""><div class="preview-item-info"><div class="preview-item-name">'+a.name+'</div><div class="preview-item-size">'+fmtSize(a.size)+'</div></div><button class="preview-remove" onclick="removeAnexo('+i+')">×</button></div>';
    return '<div class="preview-item"><span style="font-size:20px">📄</span><div class="preview-item-info"><div class="preview-item-name">'+a.name+'</div><div class="preview-item-size">'+fmtSize(a.size)+'</div></div><button class="preview-remove" onclick="removeAnexo('+i+')">×</button></div>';
  }).join('');
}

function removeAnexo(i){anexos.splice(i,1);renderPreviews();}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function sendQuick(txt){document.getElementById('welcome').style.display='none';input.value=txt;enviar();}

function addMsg(role,content,anx){
  document.getElementById('welcome').style.display='none';
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  div.className='msg '+role;
  var html='<div class="msg-avatar">'+(role==='user'?'👤':'🤖')+'</div><div class="msg-content">';
  if(anx&&anx.length) anx.forEach(function(a){
    if(a.type==='image') html+='<img class="msg-img" src="'+a.data+'" alt="'+a.name+'">';
    else html+='<div class="msg-file"><span class="msg-file-icon">📄</span><span>'+a.name+' — '+fmtSize(a.size)+'</span></div>';
  });
  html+='<div class="msg-bubble">'+escapeHtml(content)+'</div>';
  if(role==='ai'){
    html+='<div class="msg-actions"><button class="action-btn btn-copy" onclick="copiar(this)">📋 Copiar</button>';
    if(content.includes('function')||content.includes('const ')||content.includes('var ')||content.includes('let ')) html+='<button class="action-btn btn-dl-js" onclick="baixar(this,\'.js\')">⬇️ .js</button>';
    html+='<button class="action-btn btn-dl-txt" onclick="baixar(this,\'.txt\')">⬇️ .txt</button>';
    if(content.trim().startsWith('{')||content.trim().startsWith('[')) html+='<button class="action-btn btn-dl-json" onclick="baixar(this,\'.json\')">⬇️ .json</button>';
    html+='</div>';
  }
  html+='</div>';
  div.innerHTML=html;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  div.className='msg ai';div.id='typing';
  div.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-content"><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){var t=document.getElementById('typing');if(t)t.remove();}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copiar(btn){
  var bubble=btn.closest('.msg-content').querySelector('.msg-bubble');
  navigator.clipboard.writeText(bubble.innerText).then(function(){
    btn.textContent='✅ Copiado!';
    setTimeout(function(){btn.innerHTML='📋 Copiar';},2000);
  });
}

function baixar(btn,ext){
  var bubble=btn.closest('.msg-content').querySelector('.msg-bubble');
  var texto=bubble.innerText;
  var match=texto.match(/```(?:\w+)?\n?([\s\S]+?)```/);
  if(match) texto=match[1];
  var blob=new Blob([texto],{type:'text/plain'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='resposta-ia'+ext;a.click();
  URL.revokeObjectURL(url);
  btn.textContent='✅ Baixado!';
  setTimeout(function(){btn.textContent='⬇️ '+ext;},2000);
}

var historico=[];

async function enviar(){
  if(carregando) return;
  var texto=input.value.trim();
  if(!texto&&!anexos.length) return;
  var anx=anexos.slice();anexos=[];renderPreviews();
  input.value='';input.style.height='auto';
  addMsg('user',texto||'(arquivo enviado)',anx);
  document.getElementById('btn-send').disabled=true;
  carregando=true;addTyping();

  // Monta mensagem do usuário (com suporte a imagem via vision)
  var temImagem = anx.some(function(a){ return a.type==='image'; });
  var userContent;

  if(temImagem){
    // Formato multimodal para o modelo vision
    userContent = [];
    if(texto) userContent.push({type:'text', text: texto});
    anx.forEach(function(a){
      if(a.type==='image'){
        var b64 = a.data.indexOf(',') > -1 ? a.data.split(',')[1] : a.data;
        var mime = a.mimeType || 'image/jpeg';
        userContent.push({type:'image_url', image_url:{url:'data:'+mime+';base64,'+b64}});
        if(!texto) userContent.push({type:'text', text:'O que tem nessa imagem? Descreva detalhadamente.'});
      } else {
        var conteudo = typeof a.data==='string' ? a.data : '';
        userContent.push({type:'text', text:'[Arquivo: '+a.name+']\n\n'+conteudo.slice(0,3000)});
      }
    });
  } else {
    var partes=[];
    if(texto) partes.push(texto);
    anx.forEach(function(a){
      var conteudo=typeof a.data==='string'?a.data:'';
      partes.push('[Arquivo: '+a.name+']\n\n'+conteudo.slice(0,3000));
    });
    userContent = partes.join('\n\n')||texto;
  }

  historico.push({role:'user', content: userContent});
  if(historico.length>6) historico=historico.slice(-6);

  // Converte histórico: só a última mensagem pode ser multimodal, o resto vira string
  var historicoAPI = historico.map(function(m, i){
    if(Array.isArray(m.content)){
      if(i === historico.length - 1) return m; // última mensagem: mantém multimodal
      // mensagens antigas com imagem: converte pra string
      var txt = m.content.map(function(c){
        if(c.type === 'text') return c.text;
        if(c.type === 'image_url') return '[imagem]';
        return '';
      }).join(' ');
      return {role: m.role, content: txt};
    }
    return m;
  });

  try{
    var prompt = 'Você é um assistente inteligente e direto. Responde em português brasileiro. Quando gerar código, use blocos de código com ```. Seja útil, claro e objetivo.\n\n';
    historicoAPI.forEach(function(m){
      var txt = typeof m.content === 'string' ? m.content : m.content.map(function(c){ return c.text||'[imagem]'; }).join(' ');
      prompt += (m.role === 'user' ? 'Usuário: ' : 'Assistente: ') + txt + '\n';
    });
    prompt += 'Assistente:';

    var resposta = '';

    // Tenta Pollinations
    try {
      var resP = await fetch('https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?model=openai-large&seed=' + Math.floor(Math.random()*9999), {
        signal: AbortSignal.timeout(20000)
      });
      if(resP.ok) resposta = await resP.text();
    } catch(e1) {}

    // Fallback Groq se Pollinations falhar
    if(!resposta) {
      try {
