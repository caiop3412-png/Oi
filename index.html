<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#04040a;--surface:#080812;--card:#0c0c1a;--border:#1a1a3a;--cyan:#00f5ff;--pink:#ff2d78;--purple:#7b2fff;--text:#e8e8ff;--muted:#4a4a6a;--glow-cyan:0 0 20px #00f5ff44;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:600px;height:600px;background:radial-gradient(circle,#7b2fff0a 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0;animation:orb 8s ease-in-out infinite alternate;}
@keyframes orb{from{transform:translate(0,0);}to{transform:translate(-50px,50px);}}
.scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00f5ff33,transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:999;opacity:0.4;}
@keyframes scan{0%{top:-2px;}100%{top:100vh;}}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#06060f;border-right:1px solid var(--border);z-index:500;transition:left .3s ease;display:flex;flex-direction:column;}
.sidebar.open{left:0;}
.sidebar-overlay{position:fixed;inset:0;background:#000a;z-index:499;display:none;}
.sidebar-overlay.open{display:block;}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-header span{font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:1px;}
.sidebar-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;}
.sidebar-new{margin:12px;padding:10px;background:linear-gradient(135deg,#00f5ff15,#7b2fff15);border:1px solid #00f5ff33;border-radius:10px;cursor:pointer;font-size:12px;color:var(--cyan);font-family:'Syne',sans-serif;font-weight:700;width:calc(100% - 24px);}
.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-list::-webkit-scrollbar{width:2px;}
.chat-list-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid transparent;}
.chat-list-item:hover{background:#0c0c1a;border-color:var(--border);}
.chat-list-item.active{background:#0c0c1a;border-color:#00f5ff33;}
.chat-list-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-list-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;flex-shrink:0;opacity:0;}
.chat-list-item:hover .chat-list-del{opacity:1;}
.header{position:relative;z-index:10;padding:14px 16px;background:linear-gradient(180deg,#080812ee 0%,#04040aaa 100%);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header-logo{position:relative;width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00f5ff15,#7b2fff15);border:1px solid #00f5ff33;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--glow-cyan);flex-shrink:0;}
.header-logo::before{content:'';position:absolute;inset:-1px;border-radius:12px;background:linear-gradient(135deg,#00f5ff,#7b2fff,#ff2d78);z-index:-1;opacity:0.3;}
.header-text h1{font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,#00f5ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-text p{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace;}
.header-btns{margin-left:auto;display:flex;align-items:center;gap:8px;}
.header-status{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:#00f5ff;}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#00f5ff;box-shadow:0 0 8px #00f5ff;animation:pulseDot 2s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.hbtn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#0c0c1a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);}
.hbtn:hover{border-color:#00f5ff44;color:var(--cyan);}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;position:relative;z-index:1;}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:#1a1a3a;border-radius:2px;}
.msg{display:flex;gap:10px;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;align-self:flex-end;}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#00f5ff22,#7b2fff22);border:1px solid #00f5ff22;}
.msg.user .msg-avatar{background:#1a1a2e;border:1px solid #2a2a4a;}
.msg-content{max-width:82%;}
.msg-bubble{padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.65;word-break:break-word;white-space:pre-wrap;}
.msg.ai .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,#001a3a,#000d20);border:1px solid #00f5ff22;border-bottom-right-radius:4px;color:#d0f0ff;}
.msg-file{display:flex;align-items:center;gap:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:12px;color:var(--muted);}
.msg-img{max-width:200px;border-radius:10px;margin-bottom:6px;display:block;border:1px solid var(--border);}
.msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.action-btn{padding:5px 10px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;font-family:'Syne',sans-serif;}
.action-btn:active{transform:scale(.95);}
.btn-copy{background:#0c0c1a;color:#888;border:1px solid #1a1a3a;}
.btn-copy:hover{color:var(--cyan);border-color:#00f5ff44;}
.btn-regen{background:#001a0d;color:#4ade80;border:1px solid #16a34a44;}
.btn-tts{background:#1a001a;color:#c084fc;border:1px solid #7b2fff44;}
.ia-file{display:flex;align-items:center;gap:12px;background:#0c0c1a;border:1px solid #00f5ff22;border-radius:12px;padding:12px 16px;margin-top:8px;cursor:pointer;transition:all .2s;}
.ia-file:hover{border-color:#00f5ff55;background:#0f0f20;}
.ia-file-icon{font-size:28px;flex-shrink:0;}
.ia-file-info{flex:1;min-width:0;}
.ia-file-name{font-size:13px;font-weight:700;color:#00f5ff;margin-bottom:2px;}
.ia-file-size{font-size:11px;color:var(--muted);}
.ia-file-btn{background:linear-gradient(135deg,#00f5ff22,#7b2fff22);border:1px solid #00f5ff33;border-radius:8px;padding:6px 12px;color:#00f5ff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-dl-js{background:#001a00;color:#4ade80;border:1px solid #16a34a44;}
.btn-dl-txt{background:#001a2e;color:var(--cyan);border:1px solid #00f5ff33;}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:12px 14px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#333;animation:typingBounce 1.2s infinite ease-in-out;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,80%,100%{transform:scale(.6);background:#333}40%{transform:scale(1);background:var(--cyan)}}
#preview-area{display:none;padding:8px 16px;background:#06060f;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;}
#preview-area.show{display:flex;}
.preview-item{display:flex;align-items:center;gap:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:12px;max-width:200px;}
.preview-item img{width:36px;height:36px;object-fit:cover;border-radius:6px;}
.preview-item-info{flex:1;min-width:0;}
.preview-item-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);font-size:11px;}
.preview-item-size{color:var(--muted);font-size:10px;}
.preview-remove{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:0 2px;}
.input-area{padding:12px 16px;background:linear-gradient(0deg,#080812ee,#04040aaa);backdrop-filter:blur(20px);border-top:1px solid var(--border);position:relative;z-index:10;}
.input-row{display:flex;align-items:flex-end;gap:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 14px;transition:border-color .2s;}
.input-row:focus-within{border-color:#00f5ff33;box-shadow:0 0 0 1px #00f5ff11;}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;resize:none;max-height:120px;line-height:1.5;padding:4px 0;}
#msg-input::placeholder{color:var(--muted);}
.input-btns{display:flex;gap:4px;align-items:flex-end;}
.icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;}
.icon-btn:active{transform:scale(.92);}
#btn-attach{background:#0c0c1a;color:#666;border:1px solid var(--border);}
#btn-attach:hover{color:var(--cyan);}
#btn-mic{background:#0c0c1a;color:#666;border:1px solid var(--border);}
#btn-mic.listening{background:#1a000a;color:var(--pink);border-color:#ff2d7844;animation:micPulse 1s infinite;}
@keyframes micPulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 12px #ff2d7844;}}
#btn-send{background:linear-gradient(135deg,#00f5ff,#7b2fff);color:#fff;font-weight:700;border:none;box-shadow:var(--glow-cyan);}
#btn-send:hover{transform:scale(1.05);}
#btn-send:disabled{background:var(--card);color:#333;cursor:not-allowed;box-shadow:none;transform:none;}
input[type=file]{display:none;}
.welcome{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.welcome-glyph{font-size:52px;filter:drop-shadow(0 0 20px #00f5ff44);}
.welcome h2{font-size:20px;font-weight:800;background:linear-gradient(90deg,#00f5ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welcome p{font-size:13px;color:var(--muted);max-width:300px;line-height:1.7;}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px;}
.chip{padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;background:#0c0c1a;border:1px solid var(--border);color:#888;transition:all .15s;font-family:'Syne',sans-serif;}
.chip:hover{border-color:#00f5ff44;color:var(--cyan);}


/* Search bar */
.home-search{padding:8px 16px 12px;flex-shrink:0;}
.search-input-wrap{display:flex;align-items:center;gap:8px;background:#1a1a2a;border:1px solid transparent;border-radius:24px;padding:10px 14px;transition:border-color .2s;}
.search-input-wrap:focus-within{border-color:#00f5ff33;}
.search-icon{font-size:14px;color:var(--muted);flex-shrink:0;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;}
.search-input::placeholder{color:var(--muted);}

/* ── HOME SCREEN ── */
#home-screen{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1;}
#chat-screen{display:none;flex-direction:column;height:100dvh;}

.home-header{padding:16px 20px 8px;background:transparent;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.home-header-left{display:flex;align-items:center;gap:0;}
.home-logo{display:none;}

.home-title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:0;text-transform:none;background:none;-webkit-background-clip:unset;-webkit-text-fill-color:unset;}
.home-sub{display:none;}
.home-menu-btn{width:34px;height:34px;border:none;border-radius:10px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;}
.home-menu-btn:hover{border-color:#00f5ff44;color:var(--cyan);}

.home-body{flex:1;overflow-y:auto;padding:0 0 100px;}
.home-body::-webkit-scrollbar{width:3px;}
.home-body::-webkit-scrollbar-thumb{background:#1a1a3a;border-radius:2px;}

.home-section-title{display:none;}

.conv-card{background:none;border:none;border-bottom:1px solid #0f0f1a;border-radius:0;padding:14px 20px;margin-bottom:0;cursor:pointer;display:flex;align-items:center;gap:0;transition:all .2s;position:relative;}
.conv-card:hover{border-color:#00f5ff33;background:#0f0f22;}
.conv-card:active{transform:scale(.98);}
.conv-card-icon{display:none;}
.conv-card-info{flex:1;min-width:0;}
.conv-card-title{font-size:16px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.conv-card-preview{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-card-time{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;flex-shrink:0;}
.conv-card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#ef444466;cursor:pointer;font-size:14px;opacity:0;transition:opacity .15s;}
.conv-card:hover .conv-card-del{opacity:1;}

.home-empty{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.home-empty-icon{font-size:48px;filter:drop-shadow(0 0 20px #00f5ff22);}
.home-empty h3{font-size:16px;font-weight:700;color:var(--text);}
.home-empty p{font-size:13px;color:var(--muted);max-width:240px;line-height:1.6;}

.home-fab{position:fixed;bottom:28px;right:20px;background:linear-gradient(135deg,#00f5ff,#7b2fff);color:#000;font-weight:700;font-size:14px;border:none;border-radius:30px;padding:14px 24px;cursor:pointer;box-shadow:0 4px 20px #00f5ff33;z-index:50;display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;transition:all .2s;white-space:nowrap;}
.home-fab:hover{transform:scale(1.04);box-shadow:0 12px 40px #00f5ff44;}
.home-fab:active{transform:scale(.97);}

/* Menu popup dos 3 pontinhos */

/* Sidebar */
.sidebar-menu{position:fixed;top:0;left:-300px;width:280px;height:100%;background:#06060f;border-right:1px solid var(--border);z-index:600;transition:left .3s ease;display:flex;flex-direction:column;}
.sidebar-menu.open{left:0;}
.sidebar-overlay{position:fixed;inset:0;background:#000000aa;z-index:599;display:none;backdrop-filter:blur(2px);}
.sidebar-overlay.open{display:block;}
.sidebar-menu-header{padding:20px 20px 10px;flex-shrink:0;}
.sidebar-menu-title{font-size:22px;font-weight:800;color:var(--text);}
.sidebar-menu-body{flex:1;overflow-y:auto;padding:12px;}
.sidebar-menu-body::-webkit-scrollbar{width:2px;}
.sidebar-menu-body::-webkit-scrollbar-thumb{background:#1a1a3a;}
.sidebar-dev-badge{background:linear-gradient(135deg,#7b2fff22,#00f5ff11);border:1px solid #7b2fff44;border-radius:14px;padding:20px;margin:8px 0;text-align:center;}
.sidebar-dev-title{font-size:14px;font-weight:700;color:#7b2fff;margin-bottom:6px;}
.sidebar-dev-text{font-size:12px;color:var(--muted);line-height:1.6;}
.sidebar-dev-icon{font-size:32px;margin-bottom:10px;display:block;}
.sidebar-divider{height:1px;background:var(--border);margin:10px 0;}

.home-menu-popup.show{display:block;animation:fadeUp .15s ease;}




/* chat header com seta voltar */
.chat-header-back{width:34px;height:34px;border:1px solid var(--border);border-radius:10px;background:#0c0c1a;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;flex-shrink:0;}
.chat-header-back:hover{border-color:#00f5ff44;color:var(--cyan);}
</style>
</head>
<body>
<div class="scanline"></div>

<!-- ══════════════ HOME SCREEN ══════════════ -->
<div id="home-screen">

  <!-- Header Home -->
  <div class="home-header">
    <button class="home-menu-btn" onclick="toggleHomeMenu(event)" style="font-size:22px;color:var(--muted)">⋯</button>
  </div>
  <div style="padding:4px 20px 12px;">
    <div class="home-title">Conversas</div>
  </div>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="fecharSidebar()"></div>

  <!-- Sidebar Menu -->
  <div class="sidebar-menu" id="sidebar-menu">
    <div class="sidebar-menu-header">
      <div class="sidebar-menu-title">Menu</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-menu-body">
      <div class="sidebar-dev-badge">
        <span class="sidebar-dev-icon">🚧</span>
        <div class="sidebar-dev-title">Em desenvolvimento</div>
        <div class="sidebar-dev-text">Novas funcionalidades chegando em breve. Fique ligado!</div>
      </div>
    </div>
  </div>

  <!-- Barra de pesquisa -->
  <div class="home-search">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="Pesquisar conversas..." oninput="filtrarConversas(this.value)">
    </div>
  </div>

  <!-- Lista de conversas -->
  <div class="home-body" id="home-body">
    <div id="home-conv-list"></div>
  </div>

  <!-- Botão Nova Conversa -->
  <button class="home-fab" onclick="pedirNovaConversa()">＋ Nova conversa</button>

</div>

<!-- ══════════════ CHAT SCREEN ══════════════ -->
<div id="chat-screen">

  <div class="header">
    <button class="chat-header-back" onclick="voltarHome()">←</button>
    <div class="header-logo">🤖</div>
    <div class="header-text">
      <h1 id="chat-titulo">CHAT IA</h1>
      <p>Assistente inteligente</p>
    </div>
    <div class="header-btns">
      <div class="header-status"><div class="pulse-dot"></div>ONLINE</div>
    </div>
  </div>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-glyph">⬡</div>
      <h2>Olá, como posso ajudar?</h2>
      <p>Manda uma mensagem, arquivo ou foto — eu leio tudo!</p>
      <div class="welcome-chips">
        <div class="chip" onclick="sendQuick('Explica esse código pra mim')">📄 Analisar código</div>
        <div class="chip" onclick="sendQuick('Cria uma função JS que...')">⚡ Gerar JS</div>
        <div class="chip" onclick="sendQuick('O que tem nessa imagem?')">🖼️ Analisar foto</div>
        <div class="chip" onclick="sendQuick('Me ajuda com um erro no código')">🐛 Debug</div>
      </div>
    </div>
  </div>

  <div id="preview-area"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
      <div class="input-btns">
        <button class="icon-btn" id="btn-attach" onclick="document.getElementById('file-input').click()">📎</button>
        <button class="icon-btn" id="btn-stop-audio" onclick="pararAudio()" style="display:none;background:#1a000a;color:#ff2d78;border:1px solid #ff2d7844">⏹️</button>
        <button class="icon-btn" id="btn-send" onclick="enviar()">▶</button>
      </div>
    </div>
  </div>

</div>

<input type="file" id="file-input" accept="image/*,.js,.txt,.json,.html,.css,.md,.py,.ts" multiple>

<script>
// ── VARS ──
var anexos=[],carregando=false,historico=[],conversaAtual=null,conversas={},escutando=false,recognition=null,msgIdCounter=0;
var input=document.getElementById('msg-input');
var GROQ_KEY='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';

// ── NAVEGAÇÃO HOME / CHAT ──
function irParaChat(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
}
function voltarHome(){
  salvarConversaAtual();
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('home-screen').style.display='flex';
  conversaAtual=null;historico=[];
  renderHomeList();
}

// ── HOME MENU (3 pontinhos) ──
function toggleHomeMenu(e){
  e.stopPropagation();
  document.getElementById('sidebar-menu').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function fecharSidebar(){
  document.getElementById('sidebar-menu').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function limparTudo(){
  if(!confirm('Apagar todas as conversas?'))return;
  conversas={};salvarConversas();renderHomeList();
  document.getElementById('home-menu-popup').classList.remove('show');
}

// ── HOME LIST ──
function fmtTempo(ts){
  if(!ts)return'';
  var d=new Date(ts),now=new Date();
  var diff=now-d;
  if(diff<60000)return'agora';
  if(diff<3600000)return Math.floor(diff/60000)+'min';
  if(diff<86400000)return Math.floor(diff/3600000)+'h';
  if(diff<604800000){
    var dias=Math.floor(diff/86400000);
    return dias===1?'ontem':dias+'d';
  }
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function filtrarConversas(query){
  var q=query.toLowerCase().trim();
  var items=document.querySelectorAll('.conv-card');
  items.forEach(function(el){
    var title=el.querySelector('.conv-card-title').textContent.toLowerCase();
    var preview=el.querySelector('.conv-card-preview').textContent.toLowerCase();
    el.style.display=(title.includes(q)||preview.includes(q))?'':'none';
  });
  var section=document.querySelector('.home-section-title');
  if(section) section.style.display=q?'none':'';
}

function renderHomeList(){
  var cont=document.getElementById('home-conv-list');
  var ids=Object.keys(conversas).sort(function(a,b){return(conversas[b].ts||0)-(conversas[a].ts||0);});
  if(!ids.length){
    cont.innerHTML='<div class="home-empty"><div class="home-empty-icon">💬</div><h3>Nenhuma conversa</h3><p>Toque em "Nova conversa" para começar!</p></div>';
    return;
  }
  cont.innerHTML='<div class="home-section-title">Conversas recentes</div>'+ids.map(function(id){
    var c=conversas[id];
    var preview='';
    if(c.mensagens&&c.mensagens.length){
      var last=c.mensagens[c.mensagens.length-1];
      preview=(last.role==='user'?'Você: ':'')+escHtml((last.texto||'').slice(0,50));
    }
    return '<div class="conv-card" onclick="abrirConversa(\''+id+'\')">'+
      '<div class="conv-card-icon">💬</div>'+
      '<div class="conv-card-info">'+
        '<div class="conv-card-title">'+escHtml(c.titulo||'Conversa')+'</div>'+
        '<div class="conv-card-preview">'+(preview||'Sem mensagens')+'</div>'+
      '</div>'+
      '<div class="conv-card-time">'+fmtTempo(c.ts)+'</div>'+
      '<button class="conv-card-del" onclick="deletarConversa(\''+id+'\',event)">🗑️</button>'+
    '</div>';
  }).join('');
}

function pedirNovaConversa(){
  var nome=prompt('Nome da conversa:');
  if(nome===null)return; // cancelou
  if(!nome.trim()){alert('Digite um nome para a conversa!');return;}
  salvarConversaAtual();
  var id='c'+Date.now();
  conversas[id]={titulo:nome.trim()||'Nova conversa',mensagens:[],ts:Date.now()};
  conversaAtual=id;salvarConversas();
  historico=[];
  document.getElementById('chat').innerHTML='<div class="welcome" id="welcome"><div class="welcome-glyph">⬡</div><h2>'+escHtml(conversas[id].titulo)+'</h2><p>Manda uma mensagem para começar!</p><div class="welcome-chips"><div class="chip" onclick="sendQuick(\'Explica esse código pra mim\')">📄 Analisar código</div><div class="chip" onclick="sendQuick(\'Cria uma função JS que...\')">⚡ Gerar JS</div><div class="chip" onclick="sendQuick(\'O que tem nessa imagem?\')">🖼️ Analisar foto</div><div class="chip" onclick="sendQuick(\'Me ajuda com um erro no código\')">🐛 Debug</div></div></div>';
  document.getElementById('chat-titulo').textContent=conversas[id].titulo;
  irParaChat();
}

input.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}});

document.getElementById('file-input').addEventListener('change',function(){
  Array.from(this.files).forEach(function(file){
    var reader=new FileReader(),isImg=file.type.startsWith('image/');
    reader.onload=function(ev){
      anexos.push({type:isImg?'image':'file',name:file.name,size:file.size,mimeType:file.type||'text/plain',data:ev.target.result});
      renderPreviews();
    };
    if(isImg) reader.readAsDataURL(file); else reader.readAsText(file);
  });
  this.value='';
});

function renderPreviews(){
  var area=document.getElementById('preview-area');
  if(!anexos.length){area.className='';area.innerHTML='';return;}
  area.className='show';
  area.innerHTML=anexos.map(function(a,i){
    var nome=escHtml(a.name),sz=fmtSize(a.size);
    if(a.type==='image') return '<div class="preview-item"><img src="'+a.data+'" alt=""><div class="preview-item-info"><div class="preview-item-name">'+nome+'</div><div class="preview-item-size">'+sz+'</div></div><button class="preview-remove" onclick="removeAnexo('+i+')">×</button></div>';
    return '<div class="preview-item"><span style="font-size:20px">📄</span><div class="preview-item-info"><div class="preview-item-name">'+nome+'</div><div class="preview-item-size">'+sz+'</div></div><button class="preview-remove" onclick="removeAnexo('+i+')">×</button></div>';
  }).join('');
}
function removeAnexo(i){anexos.splice(i,1);renderPreviews();}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function sendQuick(t){var w=document.getElementById('welcome');if(w)w.style.display='none';input.value=t;enviar();}
function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function pararAudio(){
  if(window._audioAtual){window._audioAtual.pause();window._audioAtual=null;}
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  var b=document.getElementById('btn-stop-audio');if(b)b.style.display='none';
}

function falarTextoManual(txt){
  if(!txt)return;
  pararAudio();
  if(!window.speechSynthesis)return;
  var b=document.getElementById('btn-stop-audio');if(b)b.style.display='flex';
  var texto=txt.replace(/[`*#_]/g,'').trim();
  window.speechSynthesis.cancel();

  function iniciarFala(){
    // Divide sem repetir palavras na junção
    var partes=[];
    var frases=texto.split(/(?<=[.!?])\s+/);
    var atual='';
    frases.forEach(function(f){
      if((atual+' '+f).length>200){
        if(atual)partes.push(atual.trim());
        atual=f;
      } else {
        atual=atual?atual+' '+f:f;
      }
    });
    if(atual)partes.push(atual.trim());
    if(!partes.length)partes=[texto];
    var idx=0;
    function falarParte(){
      if(idx>=partes.length){if(b)b.style.display='none';return;}
      var u=new SpeechSynthesisUtterance(partes[idx++]);
      u.lang='pt-BR';u.rate=0.95;u.pitch=1.0;u.volume=1.0;
      var vozes=window.speechSynthesis.getVoices();
      var vozPT=vozes.find(function(v){return v.lang==='pt-BR';})
             ||vozes.find(function(v){return v.lang.startsWith('pt');});
      if(vozPT)u.voice=vozPT;
      u.onend=falarParte;
      u.onerror=function(){if(b)b.style.display='none';};
      window.speechSynthesis.speak(u);
    }
    falarParte();
  }

  var vozes=window.speechSynthesis.getVoices();
  if(vozes.length>0){
    iniciarFala();
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      iniciarFala();
    };
    setTimeout(iniciarFala,500);
  }
}

function salvarConversas(){try{localStorage.setItem('chatia_convs',JSON.stringify(conversas));}catch(e){}}
function carregarConversas(){try{var d=localStorage.getItem('chatia_convs');if(d)conversas=JSON.parse(d);}catch(e){conversas={};}}

function salvarConversaAtual(){
  if(!conversaAtual||!conversas[conversaAtual])return;
  conversas[conversaAtual].mensagens=historico.map(function(m){
    var txt=typeof m.content==='string'?m.content:(Array.isArray(m.content)?m.content.map(function(c){return c.text||'[imagem]';}).join(' '):'');
    return{role:m.role,texto:txt};
  });
  conversas[conversaAtual].ts=Date.now();
  salvarConversas();
}

function abrirConversa(id){
  salvarConversaAtual();
  conversaAtual=id;var c=conversas[id];
  historico=[];
  var chat=document.getElementById('chat');chat.innerHTML='';
  document.getElementById('chat-titulo').textContent=c.titulo||'Conversa';
  if(c.mensagens&&c.mensagens.length){
    c.mensagens.forEach(function(m){
      historico.push({role:m.role,content:m.texto||''});
      addMsgUI(m.role,m.texto||'',null,m.id,false);
    });
  }else{
    chat.innerHTML='<div class="welcome" id="welcome"><div class="welcome-glyph">⬡</div><h2>'+escHtml(c.titulo||'Conversa')+'</h2><p>Continue a conversa!</p></div>';
  }
  irParaChat();
}

function deletarConversa(id,e){
  e.stopPropagation();
  if(!confirm('Apagar esta conversa?'))return;
  delete conversas[id];
  salvarConversas();renderHomeList();
}

function addMsgUI(role,content,anx,id,save){
  var w=document.getElementById('welcome');if(w)w.style.display='none';
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  var mid=id||('m'+(++msgIdCounter));
  div.className='msg '+role;div.id=mid;
  var html='<div class="msg-avatar">'+(role==='user'?'👤':'🤖')+'</div><div class="msg-content">';
  if(anx&&anx.length)anx.forEach(function(a){
    if(a.type==='image')html+='<img class="msg-img" src="'+a.data+'" alt="">';
    else html+='<div class="msg-file"><span style="font-size:18px">📄</span><span>'+escHtml(a.name)+'</span></div>';
  });
  html+='<div class="msg-bubble">'+escHtml(content)+'</div>';
  if(role==='ai'){
    // Detectar blocos de código e criar arquivos
    var blocos=content.match(/```(\w+)?\n?([\s\S]+?)```/g)||[];
    blocos.forEach(function(bloco,bi){
      var m=bloco.match(/```(\w+)?\n?([\s\S]+?)```/);
      if(!m)return;
      var lang=m[1]||'txt';
      var code=m[2].trim();
      var ext=({js:'js',javascript:'js',html:'html',css:'css',python:'py',py:'py',json:'json',ts:'ts'})[lang]||'txt';
      var icon=({js:'📜',html:'🌐',css:'🎨',py:'🐍',json:'📊',ts:'📘'})[ext]||'📄';
      var nome='arquivo-'+(bi+1)+'.'+ext;
      var size=(code.length/1024).toFixed(1)+'KB';
      var b64=btoa(unescape(encodeURIComponent(code)));
      html+='<div class="ia-file" data-b64="'+b64+'" data-nome="'+nome+'">'+
        '<div class="ia-file-icon">'+icon+'</div>'+
        '<div class="ia-file-info">'+
        '<div class="ia-file-name">'+nome+'</div>'+
        '<div class="ia-file-size">'+size+' · Toque para baixar</div>'+
        '</div>'+
        '<button class="ia-file-btn">⬇️ Baixar</button>'+
        '</div>';
    });
    html+='<div class="msg-actions">';
    html+='<button class="action-btn btn-copy" onclick="copiar(this)">📋 Copiar</button>';
    html+='<button class="action-btn btn-tts" onclick="falarTextoManual(this.closest(\'.msg-content\').querySelector(\'.msg-bubble\').innerText)">🔊 Ouvir</button>';
    html+='<button class="action-btn btn-regen" onclick="regenerar(\''+mid+'\')">🔄 Refazer</button>';
    html+='</div>';
  }
  html+='</div>';
  div.innerHTML=html;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
  // Adicionar eventos nos arquivos da IA
  div.querySelectorAll('.ia-file').forEach(function(el){
    el.addEventListener('click',function(){baixarCodigo(this.dataset.b64,this.dataset.nome);});
  });
  if(save!==false&&conversaAtual&&conversas[conversaAtual]){
    var c=conversas[conversaAtual];
    if(!c.mensagens)c.mensagens=[];
    c.mensagens.push({role:role,texto:content,id:mid});
    if(c.mensagens.length===1&&role==='user'&&(!c.titulo||c.titulo==='Nova conversa'))c.titulo=content.slice(0,35)||'Conversa';
    c.ts=Date.now();salvarConversas();
  }
  return mid;
}

function addTyping(){var c=document.getElementById('chat');var d=document.createElement('div');d.className='msg ai';d.id='typing';d.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-content"><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}
function removeTyping(){var t=document.getElementById('typing');if(t)t.remove();}

function copiar(btn){
  var b=btn.closest('.msg-content').querySelector('.msg-bubble');
  navigator.clipboard.writeText(b.innerText).then(function(){btn.textContent='✅ Copiado!';setTimeout(function(){btn.innerHTML='📋 Copiar';},2000);});
}
function baixar(btn,ext){
  var b=btn.closest('.msg-content').querySelector('.msg-bubble');
  var t=b.innerText,m=t.match(/```(?:\w+)?\n?([\s\S]+?)```/);if(m)t=m[1];
  try{
    // Tenta blob primeiro
    var blob=new Blob([t],{type:'text/plain'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='resposta-ia'+ext;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }catch(e){
    // Fallback: data URL (funciona no app)
    var encoded=encodeURIComponent(t);
    var a=document.createElement('a');
    a.href='data:text/plain;charset=utf-8,'+encoded;
    a.download='resposta-ia'+ext;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  btn.textContent='✅ Baixado!';setTimeout(function(){btn.textContent='⬇️ '+ext;},2000);
}

function baixarCodigo(b64,nome){
  try{
    var t=decodeURIComponent(escape(atob(b64)));
    var blob=new Blob([t],{type:'text/plain'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=nome;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }catch(e){
    var a=document.createElement('a');
    a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(decodeURIComponent(escape(atob(b64))));
    a.download=nome;document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

async function buscarResposta(temImg){
  var modelo=temImg?'meta-llama/llama-4-scout-17b-16e-instruct':'llama-3.3-70b-versatile';
  var hAPI=historico.map(function(m,i){
    if(Array.isArray(m.content)){
      if(i===historico.length-1)return m;
      return{role:m.role,content:m.content.map(function(c){return c.type==='text'?c.text:'[imagem]';}).join(' ')};
    }
    return m;
  });
  if(!temImg){
    try{
      var prompt='Você é um assistente inteligente e direto. Responde em português brasileiro. Quando gerar código, use blocos de código com ```.\n\n';
      hAPI.forEach(function(m){var t=typeof m.content==='string'?m.content:'[mensagem]';prompt+=(m.role==='user'?'Usuário: ':'Assistente: ')+t+'\n';});
      prompt+='Assistente:';
      var r=await fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)+'?model=openai-large&seed='+Math.floor(Math.random()*9999),{signal:AbortSignal.timeout(25000)});
      if(r.ok){var txt=await r.text();if(txt&&txt.trim())return txt.trim();}
    }catch(e){}
  }
  try{
    var g=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:modelo,max_tokens:1000,messages:[{role:'system',content:'Você é um assistente inteligente. Responda em português brasileiro. Use ``` para código.'},...hAPI]}),
      signal:AbortSignal.timeout(20000)
    });
    var dg=await g.json();
    if(dg.choices&&dg.choices[0])return dg.choices[0].message.content;
    throw new Error('sem resposta');
  }catch(e){
    return 'Erro ao obter resposta. Verifique sua conexão.';
  }
}

async function regenerar(msgId){
  if(carregando)return;
  var el=document.getElementById(msgId);if(!el)return;
  el.remove();historico=historico.slice(0,-1);
  carregando=true;document.getElementById('btn-send').disabled=true;addTyping();
  try{
    var r=await buscarResposta(false);
    removeTyping();historico.push({role:'assistant',content:r});
    addMsgUI('ai',r,null,null,true);
  }catch(e){removeTyping();}
  carregando=false;document.getElementById('btn-send').disabled=false;
}

async function enviar(){
  if(carregando)return;
  var texto=input.value.trim();
  if(!texto&&!anexos.length)return;
  if(!conversaAtual){
    var id='c'+Date.now();
    conversas[id]={titulo:'Nova conversa',mensagens:[],ts:Date.now()};
    conversaAtual=id;salvarConversas();
    document.getElementById('chat-titulo').textContent=conversas[id].titulo;
  }
  var anx=anexos.slice();anexos=[];renderPreviews();
  input.value='';input.style.height='auto';
  var temImg=anx.some(function(a){return a.type==='image';});
  addMsgUI('user',texto||'(arquivo enviado)',anx,null,true);
  document.getElementById('btn-send').disabled=true;carregando=true;addTyping();
  var uc;
  if(temImg){
    uc=[];
    if(texto)uc.push({type:'text',text:texto});
    anx.forEach(function(a){
      if(a.type==='image'){
        var b64=a.data.indexOf(',')>-1?a.data.split(',')[1]:a.data;
        uc.push({type:'image_url',image_url:{url:'data:'+(a.mimeType||'image/jpeg')+';base64,'+b64}});
        if(!texto)uc.push({type:'text',text:'Descreva em detalhes o que você vê nessa imagem em português.'});
      }else{
        uc.push({type:'text',text:'[Arquivo: '+a.name+']\n\n'+(typeof a.data==='string'?a.data:'').slice(0,3000)});
      }
    });
  }else{
    var p=[];if(texto)p.push(texto);
    anx.forEach(function(a){p.push('[Arquivo: '+a.name+']\n\n'+(typeof a.data==='string'?a.data:'').slice(0,3000));});
    uc=p.join('\n\n')||texto;
  }
  historico.push({role:'user',content:uc});
  if(historico.length>10)historico=historico.slice(-10);
  try{
    var r=await buscarResposta(temImg);
    removeTyping();historico.push({role:'assistant',content:r});
    addMsgUI('ai',r,null,null,true);
    salvarConversaAtual();
  }catch(e){
    removeTyping();
    addMsgUI('ai','Erro ao obter resposta. Tente novamente.',null,null,false);
  }
  carregando=false;document.getElementById('btn-send').disabled=false;input.focus();
}

carregarConversas();
renderHomeList();

</script>
